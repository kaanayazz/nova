<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
<title>NOVA | Araç Sosyal Platformu</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

<style>
  *{ -webkit-tap-highlight-color:rgba(0,0,0,0)!important; outline:none!important; box-shadow:none!important; }
  html,body{ margin:0; font-family:'Segoe UI',system-ui; background:#f5f7fb; min-height:100vh; }
  body{ overflow-x:hidden; }
  a{ text-decoration:none; color:inherit; }

  /* ===============================
     HOME (ANA SAYFA)
  =============================== */
  :root{
    --color-primary:#2563ff; --color-purple:#7c3cff; --color-cyan:#00d4ff; --color-secondary:#fff; --color-dark:#07111f;
    --menu-width:70vw; --font:'Segoe UI',sans-serif;
    --menu-card-radius:15px; --slide-gap:12px;
    --story-purple:#7c3cff;
  }

  .topbar{ position:fixed; inset:0 0 auto 0; height:75px; background:linear-gradient(135deg,#2563ff,#7c3cff,#00d4ff); z-index:900; box-shadow:0 8px 28px rgba(37,99,255,.22); }
  .topbar-inner{ height:75px; padding:0 15px; display:flex; align-items:center; gap:10px; }
  .menu-btn{ width:44px; height:44px; border:none; border-radius:11px; background:#fff; color:#2563ff; display:flex; align-items:center; justify-content:center; font-size:1.44rem; cursor:pointer; box-shadow:0 2px 7px #2563ff10; margin-left:-2px; }

  /* ✅ Sağ üst: NOVA + logo (logo yuvarlak değil, küçük/fit) */
  .topbar-right{ margin-left:auto; display:flex; align-items:center; gap:10px; }
  .topbar-title{ color:#fff; font-weight:800; letter-spacing:.6px; font-size:14px; text-shadow:0 2px 6px rgba(0,0,0,.18); }
  .topbar-logo-box{
    width:56px; height:34px;
    border-radius:12px;
    background:#fff;
    display:flex; align-items:center; justify-content:center;
    padding:6px;
    overflow:hidden;
    box-shadow:0 10px 22px rgba(0,0,0,.18);
  }
  .topbar-logo-box img{ width:100%; height:100%; object-fit:contain; display:block; }

  .container{ max-width:800px; margin:0 auto; padding:60px 15px 24px; }
  @media (max-width:700px){ .container{ padding-top:76px; } .side-menu{ width:70vw; } }

  .banner-slider-wrap{
    width:100vw;
    height:160px;
    margin:0 0 8px 0;
    position:relative;
    left:50%;
    transform:translateX(-50%);
    border-radius:0px;
    overflow:hidden;
    background:#f8f4f2;
    box-shadow:0 2px 13px rgba(242,116,5,.08);
    aspect-ratio:540/209;
  }
  .banner-slider-track{ display:flex; height:100%; transition:transform .44s cubic-bezier(.35,1,.6,1); will-change:transform; }
  .banner-slide{ flex:0 0 100%; height:100%; display:flex; align-items:stretch; }
  .banner-slide img{ width:100%; height:100%; object-fit:cover; display:block; border-radius:0px; background:#ddd; pointer-events:none; user-select:none; }
  .banner-dots{ display:flex; justify-content:center; gap:10px; margin:12px 0 2px; }
  .banner-dot{ width:12px; height:12px; border-radius:50%; background:#e6e6e6; box-shadow:0 1px 4px #2563ff15; transition:background .22s; }
  .banner-dot.active{ background:var(--color-primary); box-shadow:0 2px 8px #2563ff30; }

  .story-strip{ margin-top:10px; margin-bottom:6px; padding:4px 2px 6px; }
  .story-list{ display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
  .story-item{ flex:1; text-align:center; font-size:.78rem; color:#444; font-weight:500; }
  .story-bubble-btn{
    width:58px; height:58px; border-radius:50%;
    border:2px solid rgba(255,255,255,.7); padding:2px;
    background:conic-gradient(from 180deg, #2563ff, #7c3cff, #00d4ff, #2563ff);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 16px rgba(0,0,0,.16);
    cursor:pointer;
    margin:0 auto;
  }
  .story-bubble-inner{ width:100%; height:100%; border-radius:50%; overflow:hidden; background:#111; }
  .story-bubble-inner img{ width:100%; height:100%; object-fit:cover; display:block; }
  .story-label{ margin-top:4px; max-width:70px; margin-inline:auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .profile-assistant-row{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
    margin:6px 0 10px;
  }
  .btn-purple{
    display:flex; align-items:center; justify-content:center;
    height:46px; border-radius:12px; border:none;
    background:linear-gradient(135deg,#2563ff,#7c3cff,#00d4ff);
    color:#fff; font-weight:700; font-size:.96rem;
  }
  .btn-purple i{ margin-right:6px; font-size:1rem; }
  .btn-purple.share{ cursor:pointer; }

  .top-buttons{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin:10px 0; }
  .btn-whiteorange{ background:#fff; color:#2563ff; border:2px solid #2563ff; border-radius:8px; height:44px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 2px 8px #2563ff08; }
  .btn-white-orange-border{ display:block; width:100%; height:50px; line-height:55px; text-align:center; background:#fff; color:var(--color-primary); border:2px solid var(--color-primary); border-radius:15px; font-weight:700; box-shadow:0 2px 8px #2563ff08; margin:8px 0 8px; }

  .news-list-outer{ display:flex; gap:18px; justify-content:space-between; margin:10px 0; }
  .news-card{ width:40%; aspect-ratio:1/1; border-radius:16px; background-size:cover; background-position:center; position:relative; overflow:hidden; box-shadow:0 2px 12px #2221; min-width:0; }
  .news-card::before{ content:""; position:absolute; inset:0; background:rgba(0,0,0,.23); }
  .news-card h3{ position:absolute; left:0; right:0; bottom:0; margin:0; padding:0 0 10px; color:#fff; font-weight:700; font-size:.9rem; text-align:center; text-shadow:0 2px 7px #000c; }

  .dark-card-btn{ display:block; width:100%; height:140px; border:none; border-radius:13px; overflow:hidden; color:#fff; font-weight:700; background:center/cover no-repeat; box-shadow:0 6px 22px #2563ff22; margin:10px 0; position:relative; }
  .dark-card-btn h2{ position:absolute; left:50%; bottom:10px; transform:translateX(-50%); width:94%; margin:0; text-align:center; color:#fff; font-size:1.07rem; text-shadow:0 2px 7px #000a; letter-spacing:1px; text-transform:uppercase; font-weight:700; }

  .menu-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.38); z-index:999; opacity:0; pointer-events:none; transition:opacity .26s; }
  .menu-overlay.active{ opacity:1; pointer-events:auto; }

  .side-menu{
    position:fixed; top:0; left:-500px; width:var(--menu-width); height:100vh;
    background:#fff; color:#181818; z-index:1000; box-shadow:4px 0 28px #0005;
    transition:left .33s cubic-bezier(.7,0,.2,1);
    overflow-y:auto; overflow-x:hidden; scrollbar-width:none;
  }
  .side-menu.active{ left:0; }
  .side-menu::-webkit-scrollbar{ display:none; }
  .side-menu-inner{ display:grid; row-gap:16px; padding:16px 18px 22px; }

  .menu-hero{ overflow:hidden; }
  .menu-hero-track{ display:flex; gap:var(--slide-gap); margin-inline:0; }
  .menu-hero-slide{
    flex:1 1 auto; aspect-ratio:1/1; border-radius:15px; overflow:hidden;
    background:#ddd; background-image:var(--bg); background-size:cover; background-position:center; box-shadow:0 6px 22px #2563ff22; position:relative; display:block;
  }
  .menu-hero-slide::after{ content:""; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.45), rgba(0,0,0,.15)); }
  .menu-hero-title{ position:absolute; left:50%; bottom:12px; transform:translateX(-50%); color:#fff; font-weight:800; font-size:1.25rem; text-shadow:0 2px 7px #000a; width:90%; text-align:center; padding:0 10px; z-index:2; }

  .quick-box-row{ display:flex; gap:13px; }
  .quick-box-wrap{ flex:1 1 0; display:flex; flex-direction:column; align-items:center; }
  .quick-box{
    width:100%; min-height:81px; display:flex; align-items:center; justify-content:center;
    border-radius:var(--menu-card-radius); background:var(--color-primary);
    border:2px solid #fff2; box-shadow:0 2px 10px #2563ff0a; position:relative; overflow:hidden;
  }
  .quick-box.kasko{ background:linear-gradient(rgba(0,0,0,0.25),rgba(0,0,0,0.10)), url('https://www.allianz.com.tr/tr_TR/urunler/arac-sigortalari/kasko-sigortasi/_jcr_content/root/parsys/wrapper_copy_copy_88_802173548/wrapper/wrapper_copy_copy/wrapper/vertical_tabs_copy_c/tabpar_vertical_tab_3879_2/wrapper_copy_copy/wrapper/image.img.75.3360.jpeg/1747131246197/allianz---i%CC%87yi-ki-allianz-var-f%C4%B1rt%C4%B1na-030325.jpeg') center/cover no-repeat; }
  .quick-box.trafik{ background:linear-gradient(rgba(0,0,0,0.23),rgba(0,0,0,0.06)), url('https://www.allianz.com.tr/tr_TR/hasar-islemleri/hasar-aninda/kasko-hasari-aninda/_jcr_content/root/parsys/wrapper/wrapper/wrapper/wrapper/tabs/tabpar_6412_0/teaser_copy_copy_cop/image.img.100.3360.jpeg/1741160311703/allianz---hasar-an%C4%B1nda-banner-1-300125.jpeg') center/cover no-repeat; }
  .quick-label{ margin-top:6px; font-size:1.07rem; color:#292929; font-weight:700; text-align:center; text-shadow:0 1px 6px #fff6; letter-spacing:.3px; }

  .menu-list{ display:grid; margin:0; padding:0; }
  .menu-list a{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid rgba(37,99,255,.16); font-weight:600; color:#222; }
  .menu-list a:last-child{ border-bottom:none; }
  .menu-list i{ color:#2563ff; }

  /* ✅ Görseldeki “Shopier + 3 kart + Trafik Durumu” */
  .shopier-banner{
    width:100%;
    height:92px;
    border-radius:18px;
    overflow:hidden;
    background:#5b21b6;
    box-shadow:0 10px 24px rgba(0,0,0,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:10px 0 12px;
  }
  .shopier-banner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .triple-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin:0 0 12px;
  }
  .mini-card{
    height:96px;
    border-radius:16px;
    overflow:hidden;
    position:relative;
    background:#eee;
    box-shadow:0 10px 18px rgba(0,0,0,.06);
    display:block;
  }
  .mini-card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .mini-card::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
  }
  .mini-card span{
    position:absolute;
    left:10px;
    bottom:8px;
    color:#fff;
    font-weight:700;
    font-size:14px;
    text-shadow:0 2px 8px rgba(0,0,0,.45);
  }
  .traffic-wide{
    height:98px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    box-shadow:0 12px 22px rgba(0,0,0,.08);
    margin:0 0 12px;
    display:block;
    background:#222;
  }
  .traffic-wide img{ width:100%; height:100%; object-fit:cover; display:block; }
  .traffic-wide::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(to right, rgba(0,0,0,.15), rgba(0,0,0,.35));
  }
  .traffic-wide b{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    letter-spacing:1.2px;
    font-weight:700;
    font-size:16px;
    text-shadow:0 2px 10px rgba(0,0,0,.55);
  }

  /* STORY FULLSCREEN */
  .story-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:1200;
    display:flex; align-items:stretch; justify-content:center;
    padding:16px 10px 10px;
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .story-overlay.active{ opacity:1; pointer-events:auto; }
  .story-overlay.closing .story-content{ transform:translateY(60px); }

  .story-content{
    width:min(480px,100vw);
    max-width:480px;
    margin:0 auto;
    height:100%;
    max-height:100%;
    display:flex;
    flex-direction:column;
    position:relative;
    transform:translateY(0);
    transition:transform .25s ease;
  }
  .story-progress-bar{
    position:absolute; top:0; left:4px; right:4px; height:4px;
    border-radius:999px; background:rgba(255,255,255,.25);
    overflow:hidden; z-index:3;
  }
  .story-progress-fill{ height:100%; width:0; background:#fff; transition:width linear; }
  .story-image-wrap{
    margin-top:14px; flex:1 1 auto; min-height:0;
    border-radius:18px; overflow:hidden;
    box-shadow:0 16px 45px rgba(0,0,0,.7);
    position:relative; display:flex; align-items:center; justify-content:center;
    background:#000; touch-action:pan-y pan-x;
  }
  .story-image-wrap img{ width:100%; height:100%; object-fit:contain; background:#000; }
  .story-button-row{ margin-top:10px; display:flex; gap:8px; }
  .story-btn{
    flex:1; height:40px; border-radius:999px; border:none;
    font-weight:700; font-size:.9rem; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.65); color:#fff;
  }
  .story-btn-purple{ background:linear-gradient(135deg,#2563ff,#7c3cff,#00d4ff); }
  .story-btn-red{ background:#dc2626; }

  /* ===============================
     NOVA TEMA SON DOKUNUŞLAR
  =============================== */
  body{
    background:
      radial-gradient(circle at 85% 0%, rgba(0,212,255,.18), transparent 30%),
      radial-gradient(circle at 0% 35%, rgba(124,60,255,.13), transparent 34%),
      #f5f7fb;
  }
  .container{
    background:#f8fbff;
  }
  .topbar{
    backdrop-filter:blur(18px);
  }
  .menu-btn{
    color:#2563ff;
    box-shadow:0 8px 18px rgba(37,99,255,.18)!important;
  }
  .topbar-logo-box{
    box-shadow:0 12px 26px rgba(0,212,255,.22)!important;
  }
  .btn-whiteorange,
  .btn-white-orange-border{
    color:#2563ff;
    border-color:#2563ff;
    background:rgba(255,255,255,.96);
  }
  .btn-whiteorange:hover,
  .btn-white-orange-border:hover{
    border-color:#7c3cff;
    color:#7c3cff;
  }
  .banner-dot.active{
    background:linear-gradient(135deg,#2563ff,#7c3cff,#00d4ff);
  }
  .dark-card-btn,
  .news-card,
  .quick-box,
  .menu-hero-slide{
    box-shadow:0 12px 28px rgba(37,99,255,.14)!important;
  }
  .side-menu{
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(18px);
  }
  .menu-list i{
    color:#2563ff;
  }
  .story-btn-purple{
    background:linear-gradient(135deg,#2563ff,#7c3cff,#00d4ff);
  }
  .story-progress-fill{
    background:linear-gradient(90deg,#2563ff,#7c3cff,#00d4ff);
  }

</style>
</head>

<script>
/* ============================================================
   HOME: MENÜ + BANNER SLIDER + STORY + PAYLAŞ
============================================================ */
function initHome(){
  /* Menü Aç/Kapa */
  const openMenu=document.getElementById('openMenu');
  const sideMenu=document.getElementById('sideMenu');
  const menuOv=document.getElementById('menuOverlay');
  const openSideMenu=()=>{ sideMenu.classList.add('active'); menuOv.classList.add('active'); };
  const closeSideMenu=()=>{ sideMenu.classList.remove('active'); menuOv.classList.remove('active'); };
  openMenu.addEventListener('click',openSideMenu);
  menuOv.addEventListener('click',closeSideMenu);

  /* Kenardan çek-bırak ile menüyü aç */
  document.addEventListener('touchstart',function(e){
    if(e.touches.length!==1) return;
    this._sx=e.touches[0].clientX; this._sy=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(this._sx==null) return;
    const dx=e.touches[0].clientX-this._sx;
    const dy=e.touches[0].clientY-this._sy;
    if(!sideMenu.classList.contains('active') && this._sx<32 && dx>48 && Math.abs(dx)>Math.abs(dy)){
      openSideMenu(); this._sx=null;
    }
  },{passive:true});

  /* Banner slider */
  const bannerData=[
    "https://mukellef.co/blog/wp-content/uploads/2024/08/Shopier-Nedir-Shopierde-Nasil-Satis-Yapilir-1024x539.jpg",
    "https://i2.wp.com/sigortaguvenceniz.com/wp-content/uploads/2020/02/mobil-uygulama.png?ssl=1",
    "https://www.yenigundehaber.com/wp-content/uploads/2025/01/aa.webp"
  ];
  const bannerTrack=document.getElementById('bannerSliderTrack');
  const bannerDots=document.getElementById('bannerDots');
  const allSlides=[...bannerData,...bannerData];
  bannerTrack.innerHTML='';
  allSlides.forEach(src=>{
    const d=document.createElement('div');
    d.className='banner-slide';
    d.innerHTML=`<img src="${src}" alt="Banner">`;
    bannerTrack.appendChild(d);
  });
  bannerDots.innerHTML='';
  bannerData.forEach((_,i)=>{
    const dot=document.createElement('div');
    dot.className='banner-dot';
    if(i===0) dot.classList.add('active');
    bannerDots.appendChild(dot);
  });

  let bIdx=0, bCount=bannerData.length, bTotal=allSlides.length;
  const setBPos=(p,anim=true)=>{
    bannerTrack.style.transition=anim?"transform .44s cubic-bezier(.35,1,.6,1)":"none";
    bannerTrack.style.transform=`translateX(${-p*100}%)`;
    const real=((p%bCount)+bCount)%bCount;
    bannerDots.querySelectorAll('.banner-dot').forEach((el,i)=>el.classList.toggle('active',i===real));
  };
  const fixB=()=>{
    if(bIdx>=bTotal-bCount){ bIdx-=bCount; setBPos(bIdx,false); }
    if(bIdx<0){ bIdx+=bCount; setBPos(bIdx,false); }
  };
  const goB=p=>{
    bIdx=p; setBPos(bIdx,true);
    setTimeout(fixB,460);
  };
  setBPos(0,false);
  setInterval(()=>goB(bIdx+1),3000);
  addEventListener('resize',()=>setBPos(bIdx,false));

  /* Paylaş (mor buton) */
  const shareBtn=document.getElementById("shareAroundBtn");
  shareBtn.addEventListener("click", async ()=>{
    const shareData = {
      title: "NOVA",
      text: "NOVA – Yeni nesil araç sosyal platformu",
      url: location.href
    };

    try{
      if(navigator.share){
        await navigator.share(shareData);
      }else{
        // AppCreator/Android WebView fallback
        window.location.href="http://action_share";
      }
    }catch(e){
      // iptal edilirse sessiz geç
    }
  });

  /* Story data + player */
  const storyData=[
    { title:"Kimiz?",    thumb:"https://pbs.twimg.com/media/G7vEMv5WwAAfz_o?format=png&name=small", img:"https://pbs.twimg.com/media/G76atFeXAAAxPZ2?format=jpg&name=large", link:"go:1015" },
    { title:"NOVA",   thumb:"https://pbs.twimg.com/media/G7vEOr7XUAE-36z?format=png&name=small", img:"https://pbs.twimg.com/media/G76atFXXgAEBOfv?format=jpg&name=large", link:"go:1016" },
    { title:"Mağazamız", thumb:"https://pbs.twimg.com/media/G7vEOsDWMAANgzM?format=png&name=small", img:"https://pbs.twimg.com/media/G76ap2QXIAAHzai?format=jpg&name=large", link:"go:1013" },
    { title:"Trafik",    thumb:"https://pbs.twimg.com/media/G7vEOtNXcAAefMJ?format=png&name=small", img:"https://pbs.twimg.com/media/G76e6d1XQAEPTaa?format=jpg&name=large", link:"go:1006" },
    { title:"Haberler",  thumb:"https://pbs.twimg.com/media/G7vEe5CWQAAxVcn?format=png&name=small", img:"https://pbs.twimg.com/media/G76e6dzWIAAyn4M?format=jpg&name=large", link:"go:1005" }
  ];

  const storyListEl=document.getElementById('storyList');
  storyListEl.innerHTML='';
  storyData.forEach((s,idx)=>{
    const wrap=document.createElement('div');
    wrap.className='story-item';
    wrap.innerHTML=`
      <button class="story-bubble-btn" data-story-index="${idx}">
        <span class="story-bubble-inner"><img src="${s.thumb}" alt="${s.title}"></span>
      </button>
      <div class="story-label">${s.title}</div>
    `;
    storyListEl.appendChild(wrap);
  });

  const storyOverlayEl=document.getElementById('storyOverlay');
  const storyImageEl=document.getElementById('storyImage');
  const storyProgressFill=document.getElementById('storyProgressFill');
  const storyImageWrap=document.getElementById('storyImageWrap');
  const storyViewBtn=document.getElementById('storyViewBtn');
  const storyCloseBtn=document.getElementById('storyCloseBtn');

  let currentStoryIndex=0;
  const STORY_DURATION=15000;
  let storyTimer=null;
  let storyStartTime=null;
  let storyRemaining=STORY_DURATION;
  let storyPaused=false;

  function startStoryTimer(duration=STORY_DURATION, resetWidth=true){
    storyPaused=false;
    storyRemaining=duration;
    storyStartTime=performance.now();
    storyProgressFill.style.transition='none';
    if(resetWidth) storyProgressFill.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      storyProgressFill.style.transition=`width ${duration}ms linear`;
      storyProgressFill.style.width='100%';
    }));
    if(storyTimer) clearTimeout(storyTimer);
    storyTimer=setTimeout(()=>goNextStory(),duration);
  }

  function pauseStory(){
    if(storyPaused) return;
    storyPaused=true;
    const now=performance.now();
    if(storyStartTime){
      const elapsed=now-storyStartTime;
      storyRemaining=Math.max(0, storyRemaining - elapsed);
    }
    if(storyTimer){ clearTimeout(storyTimer); storyTimer=null; }
    const computedWidth=parseFloat(getComputedStyle(storyProgressFill).width);
    const parentWidth=storyProgressFill.parentElement ? storyProgressFill.parentElement.offsetWidth : 1;
    const percent=parentWidth ? (computedWidth/parentWidth)*100 : 0;
    storyProgressFill.style.transition='none';
    storyProgressFill.style.width=percent+'%';
  }

  function resumeStory(){
    if(!storyPaused || storyRemaining<=0) return;
    startStoryTimer(storyRemaining,false);
  }

  function showStory(index){
    if(index<0 || index>=storyData.length) return;
    currentStoryIndex=index;
    const s=storyData[index];
    storyImageEl.src=s.img;
    storyRemaining=STORY_DURATION;
    startStoryTimer(STORY_DURATION,true);
  }

  function openStory(index){
    storyOverlayEl.classList.remove('closing');
    storyOverlayEl.classList.add('active');
    document.body.style.overflow='hidden';
    showStory(index);
  }

  function closeStory(animated=false){
    if(storyTimer) clearTimeout(storyTimer);
    storyTimer=null; storyPaused=false; storyRemaining=STORY_DURATION; storyStartTime=null;

    if(animated){
      storyOverlayEl.classList.add('closing');
      storyOverlayEl.classList.remove('active');
      storyOverlayEl.addEventListener('transitionend',()=>storyOverlayEl.classList.remove('closing'),{once:true});
    }else{
      storyOverlayEl.classList.remove('active');
      storyOverlayEl.classList.remove('closing');
    }
    document.body.style.overflow='';
  }

  function goNextStory(){
    const next=currentStoryIndex+1;
    if(next>=storyData.length){ closeStory(true); }
    else{ showStory(next); }
  }
  function goPrevStory(){
    const prev=currentStoryIndex-1;
    if(prev<0) showStory(0);
    else showStory(prev);
  }
  function openCurrentStoryLink(){
    const s=storyData[currentStoryIndex];
    if(s && s.link) window.location.href=s.link;
  }

  storyListEl.addEventListener('click',e=>{
    const btn=e.target.closest('.story-bubble-btn');
    if(!btn) return;
    const idx=parseInt(btn.getAttribute('data-story-index'),10);
    if(isNaN(idx)) return;
    openStory(idx);
  });

  storyViewBtn.addEventListener('click',openCurrentStoryLink);
  storyCloseBtn.addEventListener('click',()=>closeStory(false));

  // Swipe + hold pause
  let storyTouchStartX=null, storyTouchStartY=null;
  const SWIPE_H_THRESHOLD=40, SWIPE_V_THRESHOLD=50;

  storyImageWrap.addEventListener('touchstart',(e)=>{
    if(e.touches.length!==1) return;
    const t=e.touches[0];
    storyTouchStartX=t.clientX; storyTouchStartY=t.clientY;
    pauseStory();
  },{passive:true});

  storyImageWrap.addEventListener('touchend',(e)=>{
    if(storyTouchStartX===null || storyTouchStartY===null){ resumeStory(); return; }
    const t=e.changedTouches[0];
    const dx=t.clientX-storyTouchStartX;
    const dy=t.clientY-storyTouchStartY;

    let didAction=false;
    if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>SWIPE_H_THRESHOLD){
      if(dx<0) goNextStory(); else goPrevStory();
      didAction=true;
    }else if(Math.abs(dy)>SWIPE_V_THRESHOLD){
      if(dy>0) closeStory(true); else openCurrentStoryLink();
      didAction=true;
    }

    storyTouchStartX=null; storyTouchStartY=null;
    if(!didAction && storyOverlayEl.classList.contains('active')) resumeStory();
  },{passive:true});

  document.addEventListener('keydown',(e)=>{
    if(!storyOverlayEl.classList.contains('active')) return;
    if(e.key==='ArrowRight') goNextStory();
    if(e.key==='ArrowLeft') goPrevStory();
    if(e.key==='Escape') closeStory(false);
  });
}

/* ============================================================
   BOOT - INTRO YOK, DİREKT ANA SAYFA
============================================================ */
window.addEventListener("load", ()=>{
  document.getElementById("homeRoot").style.display = "block";
  document.body.style.overflow = "";
  initHome();
});
</script>

</body>
